<!-- NovaCap Principal Strategist Dashboard Preview -->
<!-- Open this file in a browser to preview the trading terminal UI -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NovaCap Principal Strategist — Terminal Dashboard</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap');
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;overflow:hidden}
  body{font-family:'Inter','Segoe UI',-apple-system,BlinkMacSystemFont,sans-serif;
       background:radial-gradient(ellipse at 30% 20%,rgba(10,30,60,0.6) 0%,transparent 60%),
                  radial-gradient(ellipse at 70% 80%,rgba(60,10,30,0.3) 0%,transparent 50%),
                  linear-gradient(180deg,#060a15 0%,#0a1020 40%,#080c18 100%);
       color:#c8d8e8;font-size:13px;line-height:1.5;display:flex;flex-direction:column}
  a{color:#54a0ff;text-decoration:none}
  ::-webkit-scrollbar{width:4px;height:4px}
  ::-webkit-scrollbar-track{background:transparent}
  ::-webkit-scrollbar-thumb{background:rgba(60,80,120,0.3);border-radius:2px}
  ::-webkit-scrollbar-thumb:hover{background:rgba(80,100,140,0.4)}

  /* ── Animated BG Orbs ── */
  body::before{content:'';position:fixed;top:-30%;left:-20%;width:60%;height:60%;
    background:radial-gradient(circle,rgba(0,180,255,0.04) 0%,transparent 70%);
    pointer-events:none;z-index:-1;animation:orb-drift 20s ease-in-out infinite}
  body::after{content:'';position:fixed;bottom:-20%;right:-10%;width:50%;height:50%;
    background:radial-gradient(circle,rgba(120,80,255,0.03) 0%,transparent 70%);
    pointer-events:none;z-index:-1;animation:orb-drift 25s ease-in-out infinite reverse}
  @keyframes orb-drift{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(5%,3%) scale(1.05)}66%{transform:translate(-3%,-2%) scale(0.95)}}

  /* ── Header ── */
  .header{background:linear-gradient(180deg,rgba(8,14,28,0.95),rgba(6,10,20,0.9));
          border-bottom:1px solid rgba(50,70,110,0.25);padding:0 24px;
          display:flex;align-items:center;justify-content:space-between;
          flex-shrink:0;z-index:10;height:52px;
          box-shadow:0 1px 0 rgba(0,0,0,0.3),inset 0 1px 0 rgba(60,90,140,0.1)}
  .header-left{display:flex;align-items:center;gap:24px}
  .logo{font-size:13px;font-weight:800;letter-spacing:1px;
        background:linear-gradient(135deg,#5ce0ff,#0099ff);
        -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
        text-transform:uppercase;position:relative}
  .logo::after{content:'';position:absolute;right:-8px;top:50%;transform:translateY(-50%);
               width:3px;height:3px;background:#5ce0ff;border-radius:50%;
               box-shadow:0 0 6px rgba(92,224,255,0.6)}
  .logo-dot{display:inline-block;width:7px;height:7px;background:#00e676;border-radius:50%;
            margin-right:10px;box-shadow:0 0 8px rgba(0,230,118,0.4);animation:pulse-dot 2s ease-in-out infinite;
            vertical-align:middle;position:relative;top:-1px}
  @keyframes pulse-dot{0%,100%{opacity:1;box-shadow:0 0 8px rgba(0,230,118,0.4)}50%{opacity:0.5;box-shadow:0 0 12px rgba(0,230,118,0.2)}}
  .header-right{display:flex;align-items:center;gap:18px}
  .header-clock{font-size:11px;font-weight:500;color:rgba(100,130,180,0.7);font-variant-numeric:tabular-nums;
                font-family:'JetBrains Mono',monospace;letter-spacing:0.5px}
  .day-badge{padding:4px 12px;border-radius:4px;font-size:9px;font-weight:700;
             text-transform:uppercase;letter-spacing:0.8px}
  .day-badge.active{background:rgba(0,230,118,0.08);color:#00e676;border:1px solid rgba(0,230,118,0.2)}
  .day-badge.idle{background:rgba(0,180,255,0.08);color:#5ce0ff;border:1px solid rgba(0,180,255,0.2)}
  .day-badge.done{background:rgba(255,80,80,0.08);color:#ff6b6b;border:1px solid rgba(255,80,80,0.2)}
  .phase-text{font-size:9px;color:rgba(100,130,180,0.6);font-weight:500;letter-spacing:0.5px;
              text-transform:uppercase}

  /* ── Layout ── */
  .main{display:flex;flex:1;overflow:hidden}

  /* ── Sidebar ── */
  .sidebar{width:200px;min-width:200px;background:rgba(6,10,18,0.7);
           border-right:1px solid rgba(50,70,110,0.15);display:flex;
           flex-direction:column;overflow:hidden}
  .sidebar-title{padding:16px 16px 8px;font-size:8px;text-transform:uppercase;
                 letter-spacing:1.5px;color:rgba(100,130,180,0.4);font-weight:700}
  .sidebar-nav{flex:1;overflow-y:auto;padding:4px 8px}
  .nav-item{padding:9px 12px;margin:2px 0;border-radius:6px;cursor:pointer;
            font-size:12px;color:rgba(120,150,190,0.6);transition:all 0.2s cubic-bezier(0.4,0,0.2,1);
            display:flex;align-items:center;gap:10px;font-weight:500;
            border-left:2px solid transparent;position:relative}
  .nav-item:hover{background:rgba(20,35,65,0.5);color:rgba(160,190,230,0.8)}
  .nav-item.active{background:rgba(0,40,80,0.3);color:#5ce0ff;
                   border-left-color:#5ce0ff}
  .nav-item.active::before{content:'';position:absolute;left:-1px;top:50%;transform:translateY(-50%);
                           width:3px;height:16px;background:#5ce0ff;border-radius:0 2px 2px 0;
                           box-shadow:0 0 8px rgba(0,180,255,0.3)}
  .nav-item .icon{font-size:11px;width:18px;text-align:center;opacity:0.5}
  .nav-item.active .icon{opacity:1}
  .nav-item .badge{font-size:8px;padding:1px 6px;border-radius:4px;
                   background:rgba(30,50,80,0.4);color:rgba(100,130,180,0.6);margin-left:auto;font-weight:600}
  .nav-item .badge.pass{background:rgba(0,230,118,0.1);color:#00e676}
  .nav-item .badge.fail{background:rgba(255,80,80,0.1);color:#ff6b6b}

  /* ── Content ── */
  .content{flex:1;overflow-y:auto;padding:18px 22px}

  /* ── Premium Cards ── */
  .card{background:linear-gradient(160deg,rgba(12,20,36,0.85),rgba(8,14,26,0.9));
        border:1px solid rgba(50,75,120,0.15);border-radius:10px;
        padding:16px;box-shadow:0 4px 24px rgba(0,0,0,0.3),inset 0 1px 0 rgba(60,90,140,0.08)}
  .card-title{font-size:10px;font-weight:600;color:rgba(120,160,210,0.6);margin-bottom:12px;
              display:flex;align-items:center;gap:6px;letter-spacing:0.6px;text-transform:uppercase}
  .card-title .accent{color:#5ce0ff}
  .card-subtitle{font-size:10px;color:rgba(100,130,180,0.5);margin-bottom:8px}

  /* ── Dashboard Layout ── */
  .dash-grid{display:grid;grid-template-columns:1.6fr 1fr;gap:12px;margin-bottom:12px}
  @media(max-width:960px){.dash-grid{grid-template-columns:1fr}}

  /* ── Market Overview ── */
  .mkt-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .mkt-card{background:linear-gradient(160deg,rgba(8,14,28,0.6),rgba(6,10,20,0.7));
            border:1px solid rgba(50,75,120,0.12);border-radius:8px;padding:14px 16px;
            position:relative;overflow:hidden}
  .mkt-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;
                    background:linear-gradient(90deg,transparent,rgba(92,224,255,0.2),transparent)}
  .mkt-sym{font-size:9px;color:rgba(100,130,180,0.5);text-transform:uppercase;font-weight:600;letter-spacing:0.8px}
  .mkt-price{font-size:22px;font-weight:700;color:#e8edf5;margin:6px 0 10px;
             font-variant-numeric:tabular-nums;font-family:'JetBrains Mono',monospace;
             letter-spacing:-0.5px}
  .mkt-chg{font-size:11px;font-weight:600;margin-left:8px;vertical-align:middle}
  .mkt-chg.up{color:#00e676;text-shadow:0 0 12px rgba(0,230,118,0.3)}
  .mkt-chg.down{color:#ff5252;text-shadow:0 0 12px rgba(255,82,82,0.3)}
  .mkt-details{display:grid;grid-template-columns:1fr 1fr;gap:2px 16px}
  .mkt-row{display:flex;justify-content:space-between;padding:3px 0;font-size:10px;border-bottom:1px solid rgba(30,50,80,0.15)}
  .mkt-row:last-child{border-bottom:none}
  .mkt-lbl{color:rgba(100,130,180,0.5)}
  .mkt-val{color:rgba(180,210,240,0.8);font-weight:500;font-family:'JetBrains Mono',monospace;font-size:9px}

  /* ── Portfolio ── */
  .pf-grid{display:grid;grid-template-columns:1fr 1fr;gap:2px 12px;margin-bottom:10px}
  .pf-item{display:flex;justify-content:space-between;align-items:center;padding:5px 8px;font-size:10px;
           background:rgba(6,10,20,0.3);border-radius:4px;border:1px solid rgba(30,50,80,0.1)}
  .pf-lbl{color:rgba(100,130,180,0.5);font-weight:500}
  .pf-val{color:rgba(200,220,240,0.9);font-weight:600;font-family:'JetBrains Mono',monospace;font-size:9px}
  .pf-val.green{color:#00e676}
  .pf-val.red{color:#ff5252}
  .pf-val.blue{color:#5ce0ff}
  .pf-val.gold{color:#ffd740}
  .pf-bar{height:3px;background:rgba(30,50,80,0.3);border-radius:2px;overflow:hidden;margin:6px 8px 4px}
  .pf-bar .fill{height:100%;border-radius:2px;transition:width 0.8s cubic-bezier(0.4,0,0.2,1)}
  .pf-bar .fill.green{background:linear-gradient(90deg,#00e676,#69f0ae)}
  .pf-bar .fill.yellow{background:linear-gradient(90deg,#ffd740,#ffe57f)}
  .pf-bar .fill.red{background:linear-gradient(90deg,#ff5252,#ff8a80)}
  .pf-stats{display:flex;justify-content:space-between;padding:0 8px;font-size:8px;color:rgba(100,130,180,0.4);font-family:'JetBrains Mono',monospace}

  /* ── Order Book ── */
  .ob-table{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .ob-side{background:rgba(6,10,20,0.3);border-radius:6px;padding:8px;border:1px solid rgba(30,50,80,0.1)}
  .ob-header{font-size:8px;color:rgba(0,230,118,0.7);text-transform:uppercase;letter-spacing:1px;font-weight:700;margin-bottom:6px;padding-bottom:4px;border-bottom:1px solid rgba(0,230,118,0.1)}
  .ob-header.asks-hdr{color:rgba(255,82,82,0.7);border-bottom-color:rgba(255,82,82,0.1)}
  .ob-row{display:grid;grid-template-columns:1fr auto auto;gap:6px;padding:4px 4px;font-size:9px;font-family:'JetBrains Mono',monospace;
          border-bottom:1px solid rgba(20,35,60,0.2);border-radius:2px;transition:background 0.15s}
  .ob-row:hover{background:rgba(30,55,90,0.15)}
  .ob-row:last-child{border-bottom:none}
  .ob-price{color:#e8edf5;font-weight:500}
  .ob-size{color:rgba(120,150,190,0.6)}
  .ob-src{color:rgba(80,110,150,0.4);font-size:8px}
  .ob-empty{padding:8px 0;color:rgba(100,130,180,0.4);font-size:9px;text-align:center}
  .ob-foot{margin-top:8px;font-size:8px;color:rgba(100,130,180,0.4);font-family:'JetBrains Mono',monospace;text-align:center}

  /* ── Actions ── */
  .btn-group{display:flex;gap:6px;flex-wrap:wrap}
  .btn{padding:8px 16px;border-radius:6px;border:none;font-size:10px;font-weight:600;
       cursor:pointer;transition:all 0.2s cubic-bezier(0.4,0,0.2,1);letter-spacing:0.5px;text-transform:uppercase;
       position:relative;overflow:hidden}
  .btn:disabled{opacity:0.25;cursor:not-allowed}
  .btn::after{content:'';position:absolute;top:0;left:0;right:0;bottom:0;
              background:linear-gradient(180deg,rgba(255,255,255,0.08) 0%,transparent 50%);
              pointer-events:none;border-radius:inherit}
  .btn-primary{background:linear-gradient(135deg,#0088cc,#0099ff);color:#fff}
  .btn-primary:hover:not(:disabled){box-shadow:0 2px 20px rgba(0,136,204,0.3);transform:translateY(-1px)}
  .btn-danger{background:linear-gradient(135deg,#cc2936,#ff5252);color:#fff}
  .btn-danger:hover:not(:disabled){box-shadow:0 2px 20px rgba(204,41,54,0.3);transform:translateY(-1px)}
  .btn-success{background:linear-gradient(135deg,#00a86b,#00e676);color:#fff}
  .btn-success:hover:not(:disabled){box-shadow:0 2px 20px rgba(0,168,107,0.3);transform:translateY(-1px)}
  .btn-warning{background:linear-gradient(135deg,#e6a800,#ffd740);color:#0a0e1a}
  .btn-warning:hover:not(:disabled){box-shadow:0 2px 20px rgba(230,168,0,0.3);transform:translateY(-1px)}
  .btn-secondary{background:rgba(30,55,90,0.4);color:rgba(160,190,230,0.8);border:1px solid rgba(50,75,120,0.2)}
  .btn-secondary:hover:not(:disabled){background:rgba(40,70,110,0.4)}
  .btn-sm{padding:6px 12px;font-size:9px}
  .btn-outline{background:transparent;border:1px solid rgba(50,75,120,0.25);color:rgba(120,150,190,0.6)}
  .btn-outline:hover{background:rgba(30,55,90,0.3);color:rgba(180,210,240,0.8)}

  /* ── Score Rows ── */
  .score-row{display:flex;justify-content:space-between;align-items:center;padding:5px 6px;
             font-size:10px;border-radius:4px;border-bottom:1px solid rgba(20,35,60,0.2);transition:background 0.15s}
  .score-row:hover{background:rgba(20,35,65,0.3)}
  .score-row:last-child{border-bottom:none}
  .score-day{color:rgba(120,150,190,0.6)}
  .score-val{color:#c8d8e8;font-weight:500;font-family:'JetBrains Mono',monospace;font-size:9px}

  /* ── Buttons in Views ── */
  .btn-inline{margin:0;display:inline-flex}

  /* ── Briefing ── */
  .briefing-content{background:rgba(6,10,20,0.4);border:1px solid rgba(40,65,105,0.12);border-radius:8px;padding:20px;font-size:12px;line-height:1.8;color:#c8d8e8}

  /* ── Results ── */
  .result-card{background:rgba(6,10,20,0.4);border:1px solid rgba(40,65,105,0.12);border-radius:8px;padding:14px;margin-bottom:10px}
  .result-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
  .result-day{font-weight:600;color:#c8d8e8;font-size:11px}
  .result-score{font-size:18px;font-weight:700;font-family:'JetBrains Mono',monospace}
  .result-issues{margin-top:8px}
  .result-ledger{margin-top:6px;font-size:10px}

  /* ── Code / Pre ── */
  .code-block{background:rgba(4,8,16,0.6);border:1px solid rgba(30,55,90,0.2);border-radius:6px;
              padding:14px;font-family:'JetBrains Mono','Cascadia Code','Fira Code','Consolas',monospace;
              font-size:11px;color:rgba(160,190,230,0.7);white-space:pre-wrap;overflow:auto;
              max-height:500px;line-height:1.6}

  /* ── Issues ── */
  .issue-list{list-style:none;margin-top:6px}
  .issue-item{padding:5px 10px;margin:2px 0;border-radius:4px;font-size:10px;
              border-left:3px solid transparent;font-family:'JetBrains Mono',monospace}
  .issue-item.critical{background:rgba(30,8,8,0.5);border-color:#ff5252;color:#ff8a80}
  .issue-item.warning{background:rgba(30,30,8,0.5);border-color:#ffd740;color:#ffe082}
  .issue-item.info{background:rgba(8,8,30,0.5);border-color:#5ce0ff;color:#80d8ff}

  /* ── Ledger table ── */
  .table-wrap{overflow-x:auto;border:1px solid rgba(40,65,105,0.12);border-radius:6px}
  .ledger-table{width:100%;border-collapse:collapse;font-size:10px}
  .ledger-table th{text-align:left;padding:7px 10px;color:rgba(100,130,180,0.5);text-transform:uppercase;
                   font-size:8px;letter-spacing:0.8px;border-bottom:1px solid rgba(40,65,105,0.15);
                   background:rgba(4,8,16,0.3);font-weight:600}
  .ledger-table td{padding:5px 10px;border-bottom:1px solid rgba(20,35,60,0.2);color:rgba(140,170,210,0.7)}
  .ledger-table tr:hover td{background:rgba(15,25,50,0.4)}
  .ledger-table .amt{font-family:'JetBrains Mono',monospace;text-align:right}

  /* ── Code Editor ── */
  .editor-wrap{border:1px solid rgba(40,65,105,0.12);border-radius:8px;overflow:hidden}
  .editor-header{display:flex;justify-content:space-between;align-items:center;
                 padding:8px 14px;background:rgba(4,8,16,0.4);
                 border-bottom:1px solid rgba(40,65,105,0.1);font-size:9px;color:rgba(100,130,180,0.5)}
  .editor-body{display:flex}
  .editor-gutter{padding:14px 10px;background:rgba(4,8,16,0.3);color:rgba(50,80,120,0.4);
                 font-family:'JetBrains Mono',monospace;font-size:11px;line-height:1.6;
                 text-align:right;user-select:none;min-width:34px;border-right:1px solid rgba(40,65,105,0.1)}
  .editor-area{flex:1}
  .editor-area textarea{width:100%;min-height:420px;background:rgba(4,8,16,0.5);color:#c8d8e8;border:none;
                        padding:14px;font-family:'JetBrains Mono',monospace;font-size:11px;line-height:1.6;
                        resize:vertical;outline:none;tab-size:2}
  .editor-area textarea:focus{background:rgba(6,10,22,0.6)}
  .editor-status{display:flex;justify-content:space-between;padding:6px 14px;
                 background:rgba(4,8,16,0.3);border-top:1px solid rgba(40,65,105,0.1);
                 font-size:8px;color:rgba(100,130,180,0.4);font-family:'JetBrains Mono',monospace}

  /* ── Loading / States ── */
  .loading{text-align:center;padding:80px 20px;color:rgba(100,130,180,0.5)}
  .spinner{display:inline-block;width:24px;height:24px;border:2px solid rgba(40,65,105,0.2);
           border-top-color:#5ce0ff;border-radius:50%;animation:spin 0.8s cubic-bezier(0.4,0,0.2,1) infinite;margin-bottom:12px}
  @keyframes spin{to{transform:rotate(360deg)}}
  .empty{text-align:center;padding:50px 20px;color:rgba(100,130,180,0.4);font-size:11px}
  .toast{position:fixed;bottom:24px;right:24px;padding:10px 20px;border-radius:8px;
         font-size:11px;font-weight:500;z-index:1000;transform:translateY(80px);opacity:0;
         transition:all 0.35s cubic-bezier(0.68,-0.55,0.27,1.55);max-width:380px;
         backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}
  .toast.show{transform:translateY(0);opacity:1}
  .toast.success{background:rgba(0,168,107,0.9);color:#fff;box-shadow:0 4px 20px rgba(0,168,107,0.3)}
  .toast.error{background:rgba(204,41,54,0.9);color:#fff;box-shadow:0 4px 20px rgba(204,41,54,0.3)}
  .toast.info{background:rgba(20,40,80,0.9);color:#c8d8e8;border:1px solid rgba(50,75,120,0.2);box-shadow:0 4px 20px rgba(0,0,0,0.3)}

  /* ── View transitions ── */
  .view-enter{animation:viewIn 0.25s ease}
  @keyframes viewIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

  /* ── Tag chips ── */
  .tag{display:inline-block;padding:2px 7px;border-radius:3px;font-size:8px;font-weight:600;
       text-transform:uppercase;letter-spacing:0.5px}
  .tag-pass{background:rgba(0,230,118,0.1);color:#00e676}
  .tag-fail{background:rgba(255,82,82,0.1);color:#ff5252}
  .tag-warn{background:rgba(255,215,64,0.1);color:#ffd740}

  /* ── Utilities ── */
  .flex{display:flex}.gap-8{gap:8px}.gap-12{gap:12px}.mt-8{margin-top:8px}.mt-12{margin-top:12px}
  .mb-12{margin-bottom:12px}.text-center{text-align:center}
  .text-muted{color:rgba(100,130,180,0.5)}
  .hidden{display:none}

  /* ── Responsive ── */
  @media(max-width:768px){.sidebar{display:none}.content{padding:12px}}
</style>
</head>
<body>

<header class="header">
  <div class="header-left">
    <div class="logo"><span class="logo-dot"></span>NovaCap Principal Strategist</div>
    <span class="phase-text" id="phaseLabel">Phase 1: Data Ingestion</span>
  </div>
  <div class="header-right">
    <span class="header-clock" id="headerClock">--:--:--</span>
    <span id="dayBadge" class="day-badge idle">Day 1 / 90</span>
  </div>
</header>

<div class="main">
  <aside class="sidebar">
    <div class="sidebar-title">Navigation</div>
    <nav class="sidebar-nav" id="sidebarNav">
      <div class="nav-item active" data-view="dashboard" onclick="switchView('dashboard')">
        <span class="icon">&#9679;</span> Dashboard</div>
      <div class="nav-item" data-view="briefing" onclick="switchView('briefing')">
        <span class="icon">&#9998;</span> Briefing</div>
      <div class="nav-item" data-view="editor" onclick="switchView('editor')">
        <span class="icon">&#128187;</span> Editor</div>
      <div class="nav-item" data-view="results" onclick="switchView('results')">
        <span class="icon">&#128202;</span> Results</div>
      <div class="nav-item" data-view="ledger" onclick="switchView('ledger')">
        <span class="icon">&#128214;</span> Ledger</div>
      <div class="nav-item" data-view="audit" onclick="switchView('audit')">
        <span class="icon">&#9881;</span> Audit</div>
      <div class="nav-item" data-view="exchange" onclick="switchView('exchange')">
        <span class="icon">&#8644;</span> Exchange</div>
    </nav>
  </aside>

  <main class="content" id="mainContent">
    <div class="loading" id="initialLoad"><div class="spinner"></div><div>Connecting to Principal Strategist engine...</div></div>
  </main>
</div>

<div id="toast" class="toast"></div>

<script>
let appData = { scores: [], current_day: 1, phase: 1 };
let currentView = 'dashboard';
let pollingInterval = null;
let editorDirty = false;

async function api(method, path, body) {
  const opts = { method, headers: {} };
  if (body) { opts.headers['Content-Type'] = 'application/json'; opts.body = JSON.stringify(body); }
  const resp = await fetch(path, opts);
  const data = await resp.json();
  if (!resp.ok) throw new Error(data.error || 'Request failed');
  return data;
}

let toastTimer = null;
function showToast(msg, type='info') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast toast-' + type + ' show';
  clearTimeout(toastTimer); toastTimer = setTimeout(() => t.classList.remove('show'), 3500);
}

function updateClock() {
  const now = new Date();
  const h = String(now.getHours()).padStart(2,'0');
  const m = String(now.getMinutes()).padStart(2,'0');
  const s = String(now.getSeconds()).padStart(2,'0');
  const el = document.getElementById('headerClock');
  if (el) el.textContent = h + ':' + m + ':' + s;
}

function switchView(view) {
  currentView = view;
  document.querySelectorAll('.nav-item').forEach(n => n.classList.toggle('active', n.dataset.view === view));
  const c = document.getElementById('mainContent');
  c.classList.remove('view-enter');
  void c.offsetWidth;
  c.classList.add('view-enter');
  renderView(view);
}

function renderView(view) {
  const c = document.getElementById('mainContent');
  const renderers = {
    dashboard: renderDashboard, briefing: renderBriefing, editor: renderEditor,
    results: renderResults, ledger: renderLedger, audit: renderAudit, exchange: renderExchange,
  };
  if (renderers[view]) renderers[view]();
  else c.innerHTML = '<div class=\\"empty\\">Unknown view</div>';
}

async function renderDashboard() {
  const c = document.getElementById('mainContent');
  c.innerHTML = '<div class=\\"loading\\"><div class=\\"spinner\\"></div><div>Loading dashboard...</div></div>';
  try {
    let status, ticker, ob;
    try { status = await api('GET', '/api/status'); } catch (e) { status = { current_day: 1, total_score: 0, max_score: 1, completed_days: 0, scores: [], phase: 1 }; }
    try { ticker = await api('GET', '/api/ticker'); } catch (e) { ticker = { running: false, prices: {} }; }
    try { ob = await api('GET', '/api/orderbook'); } catch (e) { ob = { bids: [], asks: [] }; }
    appData = status;
    const pct = status.max_score > 0 ? (status.total_score / status.max_score * 100) : 0;
    const barColor = pct >= 80 ? 'green' : pct >= 50 ? 'yellow' : 'red';
    const phaseLabel = status.phase === 1 ? 'Data Ingestion' : status.phase === 2 ? 'Arbitrage Logic' : 'Slippage & SOCPA';
    const pnl = status.total_score - (status.max_score - status.total_score) * 0.5;
    const pnlColor = pnl >= 0 ? 'green' : 'red';
    const running = ticker.running && ob.price_BTC_USD;

    // ── Market cards ──
    function mktCard(symRaw, price, bid, ask, spread, regime) {
      const sym = symRaw.replace(/_/, '/');
      const chg = ((Math.random() - 0.47) * 1.6).toFixed(2);
      const up = parseFloat(chg) >= 0;
      return '<div class=\\"mkt-card\\">' +
        '<div class=\\"mkt-sym\\">' + sym + '</div>' +
        '<div class=\\"mkt-price\\">$' + (price || 0).toLocaleString() + ' <span class=\\"mkt-chg ' + (up ? 'up' : 'down') + '\\">' + (up ? '&#9650;' : '&#9660;') + ' ' + Math.abs(parseFloat(chg)) + '%</span></div>' +
        '<div class=\\"mkt-details\\">' +
        '<div class=\\"mkt-row\\"><span class=\\"mkt-lbl\\">Bid</span><span class=\\"mkt-val\\">$' + (bid || 0).toLocaleString() + '</span></div>' +
        '<div class=\\"mkt-row\\"><span class=\\"mkt-lbl\\">Ask</span><span class=\\"mkt-val\\">$' + (ask || 0).toLocaleString() + '</span></div>' +
        '<div class=\\"mkt-row\\"><span class=\\"mkt-lbl\\">Spread</span><span class=\\"mkt-val\\">' + (spread || 0).toFixed(2) + ' bps</span></div>' +
        '<div class=\\"mkt-row\\"><span class=\\"mkt-lbl\\">Regime</span><span class=\\"mkt-val\\">' + regime + '</span></div>' +
        '</div></div>';
    }

    // ── Order book rows ──
    function obRows(side, limit) {
      if (!ob || !ob[side]) return '<div class=\\"ob-empty\\">No data</div>';
      const rows = ob[side].slice(0, limit || 4);
      return rows.length ? rows.map(function(r) {
        return '<div class=\\"ob-row\\"><span class=\\"ob-price\\">$' + (r.price || 0).toFixed(2) + '</span><span class=\\"ob-size\\">' + (r.quantity || 0).toFixed(3) + '</span><span class=\\"ob-src\\">PRIMARY</span></div>';
      }).join('') : '<div class=\\"ob-empty\\">No ' + side + '</div>';
    }

    // ── Scores table ──
    let scoresHtml = '';
    const recent = status.scores.slice(-5).reverse();
    if (recent.length > 0) {
      recent.forEach(function(s) {
        const tagClass = s.passed ? 'tag-pass' : 'tag-fail';
        const tagText = s.passed ? 'PASS' : 'FAIL';
        scoresHtml += '<div class=\\"score-row\\"><span class=\\"score-day\\">Day ' + s.day + '</span><span class=\\"score-val\\">' + s.score + '/' + s.max_score + '</span><span class=\\"tag ' + tagClass + '\\">' + tagText + '</span></div>';
      });
    } else {
      scoresHtml = '<div class=\\"text-muted\\" style=\\"padding:8px\\">No evaluations yet</div>';
    }

    // ── Assemble ──
    c.innerHTML =
      // Top row: Market cards + Portfolio
      '<div class=\\"dash-grid\\">' +
        '<div class=\\"dash-market\\">' +
          '<div class=\\"dash-section-title\\"><span class=\\"accent\\">&#9670;</span> Market Overview</div>' +
          '<div class=\\"mkt-grid\\">' +
            (running && ob.bids ? mktCard('BTC_USD', ob.price_BTC_USD, ob.bids[0] && ob.bids[0].price, ob.asks && ob.asks[0] && ob.asks[0].price, ob.spread_bps, ob.regime_name || 'N/A') : '<div class=\\"mkt-card\\"><div class=\\"text-muted\\">Exchange offline</div></div>') +
            (running ? mktCard('ETH_USDT', ob.price_ETH_USDT, ob.bids && ob.bids[0] && ob.bids[0].price, ob.asks && ob.asks[0] && ob.asks[0].price, ob.spread_bps, ob.regime_name || 'N/A') : '') +
          '</div>' +
        '</div>' +
        '<div class=\\"dash-portfolio\\">' +
          '<div class=\\"dash-section-title\\"><span class=\\"accent\\">&#128188;</span> Portfolio</div>' +
          '<div class=\\"pf-grid\\">' +
            '<div class=\\"pf-item\\"><span class=\\"pf-lbl\\">Equity</span><span class=\\"pf-val blue\\">$102,345</span></div>' +
            '<div class=\\"pf-item\\"><span class=\\"pf-lbl\\">P&amp;L</span><span class=\\"pf-val ' + pnlColor + '\\">' + (pnl >= 0 ? '+' : '') + '$' + pnl.toFixed(0) + '</span></div>' +
            '<div class=\\"pf-item\\"><span class=\\"pf-lbl\\">VaR(95%)</span><span class=\\"pf-val\\">1.23%</span></div>' +
            '<div class=\\"pf-item\\"><span class=\\"pf-lbl\\">Drawdown</span><span class=\\"pf-val gold\\">2.34%</span></div>' +
            '<div class=\\"pf-item\\"><span class=\\"pf-lbl\\">Leverage</span><span class=\\"pf-val\\">0.44x</span></div>' +
            '<div class=\\"pf-item\\"><span class=\\"pf-lbl\\">Positions</span><span class=\\"pf-val\\">12</span></div>' +
            '<div class=\\"pf-item\\"><span class=\\"pf-lbl\\">Circuit</span><span class=\\"pf-val green\\">INACTIVE</span></div>' +
            '<div class=\\"pf-item\\"><span class=\\"pf-lbl\\">Score</span><span class=\\"pf-val blue\\">' + status.total_score.toFixed(0) + '/' + status.max_score.toFixed(0) + '</span></div>' +
          '</div>' +
          '<div class=\\"pf-bar\\"><div class=\\"fill ' + barColor + '\\" style=\\"width:' + pct + '%\\"></div></div>' +
          '<div class=\\"pf-stats\\"><span>' + status.completed_days + ' / 90 days</span><span>' + pct.toFixed(0) + '%</span></div>' +
        '</div>' +
      '</div>' +
      // Middle: Order book + Actions
      '<div class=\\"dash-grid\\">' +
        '<div class=\\"dash-ob\\">' +
          '<div class=\\"dash-section-title\\"><span class=\\"accent\\">&#128202;</span> Order Book &mdash; BTC/USD</div>' +
          (running && ob.bids ? '<div class=\\"ob-table\\"><div class=\\"ob-side\\"><div class=\\"ob-header\\">Bids</div>' + obRows('bids') + '</div><div class=\\"ob-side\\"><div class=\\"ob-header asks-hdr\\">Asks</div>' + obRows('asks') + '</div></div>' : '<div class=\\"text-muted\\" style=\\"padding:12px\\">Exchange not running</div>') +
          '<div class=\\"ob-foot\\">Tick: ' + (ob.tick || 0) + ' &middot; Regime: ' + (ob.regime_name || 'N/A') + '</div>' +
        '</div>' +
        '<div class=\\"dash-actions\\">' +
          '<div class=\\"dash-section-title\\"><span class=\\"accent\\">&#9654;</span> Actions</div>' +
          '<div class=\\"btn-group\\">' +
            '<button class=\\"btn btn-primary\\" onclick=\\"actionStart()\\">Start Day</button>' +
            '<button class=\\"btn btn-danger\\" onclick=\\"actionEOD()\\">EOD</button>' +
            '<button class=\\"btn btn-success\\" onclick=\\"actionRun()\\">Run</button>' +
            '<button class=\\"btn btn-warning\\" onclick=\\"actionAdvance()\\">Advance</button>' +
          '</div>' +
          '<div class=\\"dash-section-title\\" style=\\"margin-top:16px\\"><span class=\\"accent\\">&#128203;</span> Recent Results</div>' +
          scoresHtml +
        '</div>' +
      '</div>';

    document.getElementById('dayBadge').textContent = 'Day ' + status.current_day + ' / 90';
    document.getElementById('dayBadge').className = 'day-badge ' + (status.completed_days > 0 ? 'active' : 'idle');
    document.getElementById('phaseLabel').textContent = 'Phase ' + status.phase + ': ' + phaseLabel;
  } catch (e) {
    c.innerHTML = '<div class=\\"empty\\">Error: ' + e.message + '</div>';
  }
}

async function renderBriefing() {
  const c = document.getElementById('mainContent');
  c.innerHTML = '<div class=\\"loading\\"><div class=\\"spinner\\"></div><div>Loading briefing...</div></div>';
  try {
    const data = await api('GET', '/api/briefing');
    let html = data.briefing
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/^### (.*$)/gm, '<h3 style=\\"color:#48dbfb;font-size:13px;margin:16px 0 6px\\">$1</h3>')
      .replace(/^## (.*$)/gm, '<h2 style=\\"color:#dfe6e9;font-size:15px;margin:16px 0 8px;border-bottom:1px solid rgba(21,32,48,0.4);padding-bottom:4px\\">$1</h2>')
      .replace(/^# (.*$)/gm, '<h1 style=\\"color:#48dbfb;font-size:18px;margin:0 0 10px\\">$1</h1>')
      .replace(/^- (.*$)/gm, '<li style=\\"margin:3px 0;color:#8395a7\\">$1</li>')
      .replace(/\n\n/g, '</p><p style=\\"margin:8px 0;color:#8395a7;line-height:1.7\\">')
      .replace(/\n/g, '<br>');
    c.innerHTML = '<div class=\\"card\\"><div class=\\"card-title\\"><span class=\\"accent\\">&#9998;</span> Daily Briefing &mdash; Day ' + data.day + '</div>' +
      '<div class=\\"card-subtitle\\">CMA Standards | SOCPA Compliance | NovaCap Financial Technologies</div>' +
      '<div style=\\"background:rgba(8,14,24,0.5);border:1px solid rgba(18,30,48,0.3);border-radius:6px;padding:20px;font-size:12px;line-height:1.8;color:#c8d6e5\\">' + html + '</div></div>';
  } catch (e) {
    c.innerHTML = '<div class=\\"empty\\">Error: ' + e.message + '</div>';
  }
}

async function renderEditor() {
  const c = document.getElementById('mainContent');
  c.innerHTML = '<div class=\\"loading\\"><div class=\\"spinner\\"></div><div>Loading editor...</div></div>';
  try {
    const data = await api('GET', '/api/solution');
    const lines = data.code.split('\\n');
    let gutterHtml = '';
    for (let i = 1; i <= lines.length; i++) gutterHtml += i + '\\n';
    c.innerHTML = '<div class=\\"card\\"><div class=\\"card-title\\" style=\\"justify-content:space-between\\">' +
      '<span><span class=\\"accent\\">&#128187;</span> Code Editor &mdash; Day ' + data.day + '</span>' +
      '<div class=\\"btn-group\\" style=\\"margin:0\\">' +
      '<button class=\\"btn btn-success btn-sm\\" onclick=\\"saveCode()\\">Save</button>' +
      '<button class=\\"btn btn-secondary btn-sm\\" onclick=\\"actionRun()\\">Run</button></div></div>' +
      '<div class=\\"card-subtitle\\">' + (data.path || 'No file loaded') + '</div>' +
      '<div class=\\"editor-wrap\\"><div class=\\"editor-header\\">' +
      '<div class=\\"file-info\\"><span>&#128196;</span> <span>' + (data.exists ? 'solution.py' : 'new file') + '</span></div>' +
      '<span>Python</span></div>' +
      '<div class=\\"editor-body\\"><div class=\\"editor-gutter\\">' + gutterHtml + '</div>' +
      '<div class=\\"editor-area\\"><textarea id=\\"codeEditor\\" spellcheck=\\"false\\">' + escHtml(data.code) + '</textarea></div></div>' +
      '<div class=\\"editor-status\\"><span>' + (data.exists ? 'File exists' : 'New file') + '</span><span>UTF-8 | ' + lines.length + ' lines | ' + data.code.length + ' bytes</span></div></div></div>' +
      '<div class=\\"card\\" id=\\"runOutputPanel\\" style=\\"display:none\\">' +
      '<div class=\\"card-title\\"><span class=\\"accent\\">&#9654;</span> Output</div>' +
      '<pre id=\\"runOutput\\" class=\\"code-block\\"></pre></div>';
    const ta = document.getElementById('codeEditor');
    if (ta) ta.addEventListener('input', function() { editorDirty = true; });
  } catch (e) {
    c.innerHTML = '<div class=\\"empty\\">Error: ' + e.message + '</div>';
  }
}

async function renderResults() {
  const c = document.getElementById('mainContent');
  c.innerHTML = '<div class=\\"loading\\"><div class=\\"spinner\\"></div><div>Loading results...</div></div>';
  try {
    const data = await api('GET', '/api/results');
    const results = data.results || [];
    if (results.length === 0) {
      c.innerHTML = '<div class=\\"card\\"><div class=\\"empty\\">No evaluations yet. Start a day and run EOD.</div></div>';
      return;
    }
    let html = '<div class=\\"card\\"><div class=\\"card-title\\"><span class=\\"accent\\">&#128202;</span> Evaluation Results</div>';
    var resultsCopy = results.slice().reverse();
    for (var j = 0; j < resultsCopy.length; j++) {
      var r = resultsCopy[j];
      var pct = r.max_score > 0 ? (r.score / r.max_score * 100) : 0;
      var passed = r.passed;
      var violations = r.violations || [];
      var astIssues = r.ast_issues || [];
      html += '<div style=\\"background:rgba(8,14,24,0.5);border:1px solid rgba(18,30,48,0.3);border-radius:6px;padding:14px;margin-bottom:10px\\">' +
        '<div style=\\"display:flex;justify-content:space-between;align-items:center;margin-bottom:8px\\">' +
        '<span style=\\"font-weight:600;color:#dfe6e9\\">Day ' + r.day + '</span>' +
        '<span style=\\"font-size:20px;font-weight:700;color:' + (passed ? '#2ecc71' : '#ff6b6b') + '\\">' + r.score + '/' + r.max_score + ' (' + pct.toFixed(0) + '%)</span></div>' +
        '<span class=\\"tag ' + (passed ? 'tag-pass' : 'tag-fail') + '\\">' + (passed ? 'PASS' : 'FAIL') + '</span>';
      if (violations.length > 0) {
        html += '<div style=\\"margin-top:8px\\"><strong style=\\"color:#ff6b6b;font-size:11px\\">Violations:</strong><ul class=\\"issue-list\\">';
        for (var v = 0; v < violations.length; v++) html += '<li class=\\"issue-item critical\\">' + escHtml(violations[v]) + '</li>';
        html += '</ul></div>';
      }
      if (astIssues.length > 0) {
        html += '<div style=\\"margin-top:6px\\"><strong style=\\"color:#feca57;font-size:11px\\">AST Issues:</strong><ul class=\\"issue-list\\">';
        var maxIssues = Math.min(astIssues.length, 5);
        for (var a = 0; a < maxIssues; a++) html += '<li class=\\"issue-item warning\\">' + escHtml(astIssues[a]) + '</li>';
        html += '</ul></div>';
      }
      html += '<div style=\\"margin-top:6px;font-size:11px\\"><span style=\\"color:#4a5a6a\\">Ledger: </span><span style=\\"color:' + (r.ledger_balanced ? '#2ecc71' : '#ff6b6b') + '\\">' + (r.ledger_balanced ? 'Balanced' : 'Imbalanced') + '</span></div></div>';
    }
    html += '</div>';
    c.innerHTML = html;
  } catch (e) {
    c.innerHTML = '<div class=\\"empty\\">Error: ' + e.message + '</div>';
  }
}

async function renderLedger() {
  const c = document.getElementById('mainContent');
  c.innerHTML = '<div class=\\"loading\\"><div class=\\"spinner\\"></div><div>Loading ledger...</div></div>';
  try {
    const data = await api('GET', '/api/ledger');
    if (data.error) { c.innerHTML = '<div class=\\"empty\\">' + data.error + '</div>'; return; }
    var accountsHtml = '';
    var accounts = data.accounts || [];
    for (var i = 0; i < accounts.length; i++) {
      accountsHtml += '<tr><td>' + accounts[i].code + '</td><td>' + escHtml(accounts[i].name) + '</td><td>' + accounts[i].type + '</td><td class=\\"amt\\">$' + accounts[i].balance.toFixed(2) + '</td></tr>';
    }
    var pnlHtml = '';
    var pnlData = data.pnl || [];
    for (var j = 0; j < pnlData.length; j++) {
      var netColor = pnlData[j].net_pnl >= 0 ? '#2ecc71' : '#ff6b6b';
      pnlHtml += '<tr><td>' + pnlData[j].symbol + '</td><td class=\\"amt\\">$' + pnlData[j].realized_pnl.toFixed(2) + '</td><td class=\\"amt\\">$' + pnlData[j].total_fees.toFixed(2) + '</td><td class=\\"amt\\" style=\\"color:' + netColor + '\\">$' + pnlData[j].net_pnl.toFixed(2) + '</td></tr>';
    }
    c.innerHTML = '<div class=\\"card\\"><div class=\\"card-title\\"><span class=\\"accent\\">&#128214;</span> Ledger Engine</div>' +
      '<div class=\\"stat-grid\\" style=\\"margin-bottom:12px\\">' +
      '<div class=\\"stat-card\\"><div class=\\"label\\">Trades</div><div class=\\"value blue\\">' + data.trade_count + '</div></div>' +
      '<div class=\\"stat-card\\"><div class=\\"label\\">Status</div><div class=\\"value ' + (data.balanced ? 'green' : 'red') + '\\">' + (data.balanced ? 'BALANCED' : 'IMBALANCE') + '</div></div>' +
      '<div class=\\"stat-card\\"><div class=\\"label\\">Diff</div><div class=\\"value\\" style=\\"color:#feca57\\">$' + data.difference.toFixed(2) + '</div></div></div></div>' +
      '<div class=\\"card\\"><div class=\\"card-title\\"><span class=\\"accent\\">&#128202;</span> Account Balances</div>' +
      '<div class=\\"table-wrap\\"><table class=\\"ledger-table\\"><thead><tr><th>Code</th><th>Name</th><th>Type</th><th>Balance</th></tr></thead><tbody>' + (accountsHtml || '<tr><td colspan=\\"4\\" style=\\"color:#4a5a6a\\">No accounts</td></tr>') + '</tbody></table></div></div>' +
      '<div class=\\"card\\"><div class=\\"card-title\\"><span class=\\"accent\\">&#128200;</span> P&amp;L by Symbol</div>' +
      '<div class=\\"table-wrap\\"><table class=\\"ledger-table\\"><thead><tr><th>Symbol</th><th>Realized P&amp;L</th><th>Fees</th><th>Net P&amp;L</th></tr></thead><tbody>' + (pnlHtml || '<tr><td colspan=\\"4\\" style=\\"color:#4a5a6a\\">No trades yet</td></tr>') + '</tbody></table></div></div>';
  } catch (e) {
    c.innerHTML = '<div class=\\"empty\\">Error: ' + e.message + '</div>';
  }
}

async function renderAudit() {
  const c = document.getElementById('mainContent');
  c.innerHTML = '<div class=\\"loading\\"><div class=\\"spinner\\"></div><div>Running AST audit...</div></div>';
  try {
    const data = await api('GET', '/api/audit');
    let issuesHtml = '';
    if (data.error) {
      issuesHtml = '<div class=\\"empty\\">' + data.error + '</div>';
    } else if (!data.issues || data.issues.length === 0) {
      issuesHtml = '<div style=\\"text-align:center;padding:20px;color:#2ecc71;font-size:13px\\">&#10003; No issues found. Code passes structural audit.</div>';
    } else {
      var issues = data.issues;
      for (var i = 0; i < issues.length; i++) {
        var cls = issues[i].severity === 'critical' ? 'critical' : issues[i].severity === 'warning' ? 'warning' : 'info';
        var label = issues[i].severity.toUpperCase();
        issuesHtml += '<li class=\\"issue-item ' + cls + '\\"><strong>' + label + '</strong> L' + (issues[i].line || '?') + ': ' + escHtml(issues[i].message) + '</li>';
      }
    }
    var summary = data.summary || {};
    c.innerHTML = '<div class=\\"card\\"><div class=\\"card-title\\"><span class=\\"accent\\">&#9881;</span> AST Static Code Audit</div>' +
      '<div class=\\"stat-grid\\" style=\\"margin-bottom:12px\\">' +
      '<div class=\\"stat-card\\"><div class=\\"label\\">Critical</div><div class=\\"value ' + (summary.critical > 0 ? 'red' : 'green') + '\\">' + summary.critical + '</div></div>' +
      '<div class=\\"stat-card\\"><div class=\\"label\\">Warnings</div><div class=\\"value ' + (summary.warning > 0 ? 'gold' : 'green') + '\\">' + summary.warning + '</div></div>' +
      '<div class=\\"stat-card\\"><div class=\\"label\\">Info</div><div class=\\"value blue\\">' + summary.info + '</div></div>' +
      '<div class=\\"stat-card\\"><div class=\\"label\\">Score</div><div class=\\"value blue\\">' + (summary.complexity_score || 0) + '</div></div></div>' +
      '<ul class=\\"issue-list\\">' + issuesHtml + '</ul></div>';
  } catch (e) {
    c.innerHTML = '<div class=\\"empty\\">Error: ' + e.message + '</div>';
  }
}

async function renderExchange() {
  const c = document.getElementById('mainContent');
  c.innerHTML = '<div class=\\"loading\\"><div class=\\"spinner\\"></div><div>Loading exchange status...</div></div>';
  try {
    const data = await api('GET', '/api/exchange');
    if (data.running) {
      c.innerHTML = '<div class=\\"card\\"><div class=\\"card-title\\"><span class=\\"accent\\">&#8644;</span> Mock Exchange <span class=\\"tag tag-pass\\" style=\\"margin-left:8px\\">ONLINE</span></div>' +
        '<div class=\\"stat-grid\\">' +
        '<div class=\\"stat-card\\"><div class=\\"label\\">Status</div><div class=\\"value green\\">RUNNING</div></div>' +
        '<div class=\\"stat-card\\"><div class=\\"label\\">Endpoint</div><div class=\\"value blue\\" style=\\"font-size:14px\\">' + (data.host || 'localhost') + ':' + (data.port || 8080) + '</div></div>' +
        '<div class=\\"stat-card\\"><div class=\\"label\\">Ticks</div><div class=\\"value gold\\">' + (data.tick || 0) + '</div></div>' +
        '<div class=\\"stat-card\\"><div class=\\"label\\">Symbols</div><div class=\\"value blue\\">' + (data.symbols || []).length + '</div></div></div>' +
        '<div class=\\"card-subtitle\\" style=\\"margin-top:12px\\">REST API Endpoints</div>' +
        '<div style=\\"font-family:JetBrains Mono,monospace;font-size:11px;color:#4a5a6a;line-height:1.8\\">' +
        'GET  /v1/orderbook?symbol=BTC/USD<br>' +
        'GET  /v1/ticker?symbol=ETH/USDT<br>' +
        'POST /v1/execute<br>' +
        'GET  /v1/health</div></div>';
    } else {
      c.innerHTML = '<div class=\\"card\\"><div class=\\"card-title\\"><span class=\\"accent\\">&#8644;</span> Mock Exchange <span class=\\"tag tag-fail\\" style=\\"margin-left:8px\\">OFFLINE</span></div>' +
        '<div class=\\"stat-card\\"><div class=\\"label\\">Status</div><div class=\\"value\\" style=\\"color:#ff6b6b\\">STOPPED</div></div>' +
        '<div style=\\"margin-top:12px;color:#4a5a6a;font-size:12px\\">Start a day to launch the exchange server on port 8080.</div></div>';
    }
  } catch (e) {
    c.innerHTML = '<div class=\\"empty\\">Error: ' + e.message + '</div>';
  }
}

async function actionStart() {
  try { showToast('Starting day...', 'info'); await api('POST', '/api/start'); showToast('Day started!', 'success'); renderView(currentView); }
  catch (e) { showToast('Error: ' + e.message, 'error'); }
}

async function actionEOD() {
  try { showToast('Running EOD evaluation...', 'info'); await api('POST', '/api/eod'); showToast('EOD complete! Check Results.', 'success'); renderView(currentView); }
  catch (e) { showToast('Error: ' + e.message, 'error'); }
}

async function actionAdvance() {
  try { await api('POST', '/api/advance'); showToast('Advanced to next day!', 'success'); renderView(currentView); }
  catch (e) { showToast('Cannot advance: ' + e.message, 'error'); }
}

async function actionRun() {
  try {
    showToast('Executing...', 'info');
    const data = await api('POST', '/api/run', { args: '' });
    const panel = document.getElementById('runOutputPanel');
    const out = document.getElementById('runOutput');
    if (panel && out) {
      panel.style.display = 'block';
      out.textContent = '';
      if (data.stdout) out.textContent += data.stdout;
      if (data.stderr) out.textContent += '\\n[STDERR]\\n' + data.stderr;
      if (data.error) out.textContent += '\\n[ERROR]\\n' + data.error;
      if (data.success) showToast('Execution OK (exit 0)', 'success');
      else showToast('Execution completed with errors', 'error');
    } else {
      showToast(data.success ? 'Execution OK' : 'Execution had errors', data.success ? 'success' : 'error');
      renderView(currentView);
    }
  } catch (e) { showToast('Error: ' + e.message, 'error'); }
}

async function saveCode() {
  const ta = document.getElementById('codeEditor');
  if (!ta) return;
  try { await api('POST', '/api/save', { code: ta.value }); editorDirty = false; showToast('Code saved!', 'success'); }
  catch (e) { showToast('Error saving: ' + e.message, 'error'); }
}

function escHtml(str) {
  if (!str) return '';
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

function startPolling() {
  if (pollingInterval) clearInterval(pollingInterval);
  pollingInterval = setInterval(function() {
    if (currentView === 'dashboard') {
      fetch('/api/ticker').then(function(r) { return r.json(); }).then(function(d) {
        var el = document.querySelector('.ticker-inner');
        if (el && d.running && d.prices) {
          var entries = Object.entries(d.prices);
          var doubled = entries.concat(entries);
          var h = '';
          for (var i = 0; i < doubled.length; i++) {
            var sym = doubled[i][0], pr = doubled[i][1];
            var chg = ((Math.random() - 0.48) * 2).toFixed(2);
            var c = parseFloat(chg) >= 0 ? '#2ecc71' : '#ff6b6b';
            var s = parseFloat(chg) >= 0 ? '+' : '';
            h += '<div class=\\"ticker-item\\"><span class=\\"sym\\">' + sym + '</span><span class=\\"pr\\" style=\\"color:#feca57\\">$' + Number(pr).toLocaleString() + '</span><span class=\\"chg\\" style=\\"color:' + c + '\\">' + s + chg + '%</span></div>';
          }
          el.innerHTML = h;
        }
      }).catch(function() {});
    }
  }, 3000);
}

window.onload = function() {
  renderDashboard();
  startPolling();
  setInterval(updateClock, 1000);
  updateClock();
};
</script>
</body>
</html>
