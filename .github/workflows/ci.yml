name: NovaCap CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Verify zero external dependencies
      run: |
        python -c "import sys; assert 'pip' not in sys.modules"
        echo "Zero-dependency check passed"

    - name: Validate AST parser
      run: |
        python -c "
        import ast
        with open('arbitrage_academy.py') as f:
            tree = ast.parse(f.read())
        classes = [n.name for n in ast.walk(tree) if isinstance(n, ast.ClassDef)]
        print('Classes found: %d' % len(classes))
        for c in classes:
            print('  - ' + c)
        "

    - name: Validate mock exchange starts
      run: |
        python -c "
        import threading, time, json, urllib.request
        from arbitrage_academy import MockExchangeServer, MockPriceGenerator
        pg = MockPriceGenerator(seed=42)
        server = MockExchangeServer()
        if not server.start():
            exit(1)
        time.sleep(0.5)
        try:
            with urllib.request.urlopen('http://localhost:8080/v1/health') as resp:
                data = json.loads(resp.read())
                assert data['status'] == 'operational'
                print('Health check OK: ' + str(data))
        finally:
            server.stop()
        print('Mock exchange validation passed')
        "

    - name: Validate regime switching
      run: |
        python -c "
        from arbitrage_academy import MockPriceGenerator, REGIMES
        pg = MockPriceGenerator(seed=42)
        regimes_seen = set()
        for _ in range(500):
            pg.update()
            regimes_seen.add(pg.current_regime)
        print('Regimes visited: ' + str(regimes_seen))
        assert len(regimes_seen) > 1, 'Regime switching did not activate'
        print('Regime switching validation passed')
        "

    - name: Validate limit order book
      run: |
        python -c "
        from arbitrage_academy import OrderBookManager
        obm = OrderBookManager()
        oid1 = obm.add_limit_order({'symbol':'BTC/USD','side':'sell','price':70000,'quantity':1.0})
        oid2 = obm.add_limit_order({'symbol':'BTC/USD','side':'buy','price':69000,'quantity':0.5})
        result = obm.match_market_order('BTC/USD','buy',0.3)
        print('Market match result: ' + str(result))
        assert result['filled_qty'] > 0, 'Order matching failed'
        print('Order book management validation passed')
        "

    - name: Validate CodeAuditor
      run: |
        python -c "
        from arbitrage_academy import CodeAuditor
        auditor = CodeAuditor()
        bad_code = 'x = eval(\"1+1\")\\ndef f():\\n    while True:\\n        pass'
        issues = auditor.audit(bad_code)
        print('Issues found: %d' % len(issues))
        for i in issues:
            sev = i['severity']; msg = i['message']
            print('  [%s] %s' % (sev, msg))
        assert any('eval' in i['message'].lower() for i in issues), 'Should flag eval()'
        assert any('infinite' in i['message'].lower() for i in issues), 'Should flag infinite loop'
        print('CodeAuditor validation passed')
        "

    - name: Validate LedgerEngine
      run: |
        python -c "
        import os, sqlite3
        from arbitrage_academy import LedgerEngine
        db = '__test_ledger.db'
        ledger = LedgerEngine(db)
        ledger.connect()
        ok = ledger.record_trade('T0001', 1, 'BTC/USD', 'buy', 50000, 1.0, 50000, 50.0)
        assert ok, 'Trade recording failed'
        trades = ledger.get_trades(1)
        assert len(trades) == 1, 'Expected 1 trade, got %d' % len(trades)
        balanced, diff = ledger.verify_double_entry()
        assert balanced, 'Ledger not balanced: diff=%s' % str(diff)
        ledger.close()
        os.remove(db)
        print('LedgerEngine validation passed')
        "

    - name: Validate RiskManager
      run: |
        python -c "
        from arbitrage_academy import RiskManager, LedgerEngine
        import os
        db = '__test_risk.db'
        ledger = LedgerEngine(db)
        ledger.connect()
        rm = RiskManager(ledger)
        report = rm.risk_report(1)
        print('Risk report generated (%d chars)' % len(report))
        assert not rm.halted, 'Should not be halted on init'
        var = rm.compute_var(0.95)
        cvar = rm.compute_cvar(0.95)
        print('VaR: %s, CVaR: %s' % (str(var), str(cvar)))
        ledger.close()
        os.remove(db)
        print('RiskManager validation passed')
        "

    - name: Validate BacktestEngine
      run: |
        python -c "
        from arbitrage_academy import BacktestEngine, LedgerEngine
        import os
        db = '__test_bt.db'
        ledger = LedgerEngine(db)
        ledger.connect()
        bt = BacktestEngine(ledger)
        assert bt.runs == []
        print('BacktestEngine init OK')
        ledger.close()
        os.remove(db)
        print('BacktestEngine validation passed')
        "

    - name: Validate CLI parses
      run: |
        python -c "
        import ast
        with open('arbitrage_academy.py') as f:
            tree = ast.parse(f.read())
        for node in ast.walk(tree):
            if isinstance(node, ast.ClassDef) and node.name == 'ArbitrageAcademyCLI':
                methods = [n.name for n in node.body if isinstance(n, (ast.FunctionDef, ast.AsyncFunctionDef))]
                expected = ['do_start','do_eod','do_advance','do_run','do_backtest','do_risk','do_risk_reset']
                for e in expected:
                    assert e in methods, 'Missing method: ' + e
                print('ArbitrageAcademyCLI methods validated: %d total' % len(methods))
                break
        "

    - name: Full integration smoke test
      run: |
        python -c "
        import json, os, urllib.request, time
        from arbitrage_academy import MockExchangeServer, MockPriceGenerator, OrderBookManager

        pg = MockPriceGenerator(seed=42)
        server = MockExchangeServer()
        assert server.start(), 'Server start failed'
        time.sleep(0.5)

        # Health
        with urllib.request.urlopen('http://localhost:8080/v1/health') as resp:
            h = json.loads(resp.read())
            assert h['status'] == 'operational'
            print('Health OK: uptime=%d ticks' % h['uptime_ticks'])

        # Order book
        with urllib.request.urlopen('http://localhost:8080/v1/orderbook?symbol=BTC/USD') as resp:
            ob = json.loads(resp.read())
            assert 'bids' in ob
            assert 'regime' in ob
            print('Order book OK: bids=%d regime=%s' % (len(ob['bids']), ob['regime_name']))

        # Ticker
        with urllib.request.urlopen('http://localhost:8080/v1/ticker?symbol=ETH/USDT') as resp:
            tk = json.loads(resp.read())
            assert 'regime_name' in tk
            print('Ticker OK: price=%s regime=%s' % (str(tk['price']), tk['regime_name']))

        # Regime endpoint
        with urllib.request.urlopen('http://localhost:8080/v1/regime') as resp:
            rg = json.loads(resp.read())
            print('Regime endpoint OK: %s' % rg['regime_name'])

        # Market order
        req = urllib.request.Request(
            'http://localhost:8080/v1/execute',
            data=json.dumps({'symbol':'BTC/USD','side':'buy','quantity':0.1,'type':'market'}).encode(),
            headers={'Content-Type':'application/json'},
        )
        with urllib.request.urlopen(req) as resp:
            ex = json.loads(resp.read())
            print('Market order OK: filled=%s avg=%s' % (str(ex['filled_qty']), str(ex['avg_price'])))

        # Limit order
        req = urllib.request.Request(
            'http://localhost:8080/v1/execute',
            data=json.dumps({'symbol':'BTC/USD','side':'buy','quantity':0.5,'type':'limit','price':60000}).encode(),
            headers={'Content-Type':'application/json'},
        )
        with urllib.request.urlopen(req) as resp:
            lm = json.loads(resp.read())
            print('Limit order OK: status=%s' % lm['status'])

        # FOK (should cancel)
        req = urllib.request.Request(
            'http://localhost:8080/v1/execute',
            data=json.dumps({'symbol':'BTC/USD','side':'buy','quantity':100,'type':'fok'}).encode(),
            headers={'Content-Type':'application/json'},
        )
        with urllib.request.urlopen(req) as resp:
            fok = json.loads(resp.read())
            print('FOK order OK: status=%s reason=%s' % (fok['status'], fok.get('reason','')))

        # Orders endpoint
        with urllib.request.urlopen('http://localhost:8080/v1/orders?status=open') as resp:
            ords = json.loads(resp.read())
            print('Orders endpoint OK: %d open' % ords['count'])

        # Tick advance
        req = urllib.request.Request(
            'http://localhost:8080/v1/orderbook',
            data=b'{}', headers={'Content-Type':'application/json'}, method='POST',
        )
        with urllib.request.urlopen(req) as resp:
            tk2 = json.loads(resp.read())
            print('Tick advance OK: tick=%d regime=%d' % (tk2['tick'], tk2['regime']))

        server.stop()
        print('ALL INTEGRATION TESTS PASSED')
        "

    - name: Validate Dockerfile
      run: |
        python -c "
        with open('Dockerfile') as f:
            content = f.read()
            assert 'python:3.11-slim' in content
            assert 'EXPOSE 8080 8081' in content
            assert 'arbitrage_academy.py' in content
            print('Dockerfile validation passed')
        "
